[build]
  publish = "site"
  # Data under site/data/ is pre-built (via `python export.py`) and committed,
  # so deploys are pure static — no build step, no DB, no Python at deploy time.
  command = ""

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
