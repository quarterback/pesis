<!doctype html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Mallo{% endblock %} · pesäpallodata</title>
<style>
/* ── Mallo design tokens ─────────────────────────────────────────────── */
body {
  --apricot:    #f9dbbd; --candy:   #ffa5ab;
  --blush:      #da627d; --berry:   #a53860; --bordeaux: #450920;
  --ink1: #1a0a10; --ink2: #6b3a4a; --ink3: #a07080;
  --surface0: #fff8f4; --surface1: #fff2ea;
  --track: #f0ddd5; --grid: #e8cfc5; --ring: rgba(165,56,96,.14);
  --accent: var(--berry);
  --p0:#e6ddd2;--p1:#f4d8c2;--p2:#ffc7bb;--p3:#ffa5ab;
  --p4:#da627d;--p5:#a53860;--p6:#450920;
  --pt0:#5a4a3a;--pt1:#7a4a30;--pt2:#8a3a34;--pt3:#7a2438;
  --pt4:#fff;--pt5:#fff;--pt6:#fff;
  --cat1:var(--berry);--cat2:#1baf7a;--cat3:#eda100;--cat4:#008300;
}
@media (prefers-color-scheme:dark) {
  body {
    --ink1:#fce8dd;--ink2:#c8909a;--ink3:#8a5060;
    --surface0:#1a0810;--surface1:#240e16;
    --track:#3a1824;--grid:#4a2030;--ring:rgba(255,165,180,.10);
    --accent:var(--candy);
    --p0:#3c2731;--p1:#5f2c3c;--p2:#8c3a54;--p3:#bd4d6d;
    --p4:#da627d;--p5:#ff909b;--p6:#ffc6ac;
    --pt0:#d9b8c0;--pt1:#f0c8d0;--pt2:#fff;--pt3:#fff;
    --pt4:#2a0f18;--pt5:#2a0f18;--pt6:#2a0f18;
    --cat1:var(--candy);--cat2:#199e70;--cat3:#c98500;--cat4:#008300;
  }
}

/* ── Reset / base ─────────────────────────────────────────────────────── */
*{box-sizing:border-box}
body{
  margin:0;background:var(--surface0);color:var(--ink1);
  font:15px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Header ───────────────────────────────────────────────────────────── */
header{
  background:var(--surface1);border-bottom:1px solid var(--grid);
  padding:0 20px;display:flex;align-items:center;gap:6px;
  min-height:52px;flex-wrap:wrap;row-gap:0;
}
.brand{
  font-size:20px;font-weight:800;letter-spacing:-.5px;
  color:var(--ink1);margin-right:18px;flex-shrink:0;white-space:nowrap;
}
.brand i{color:var(--berry);font-style:normal}
@media(prefers-color-scheme:dark){.brand i{color:var(--candy)}}
header nav{display:flex;gap:2px;flex-wrap:wrap;flex:1;min-width:0}
header nav a{
  color:var(--ink2);font-size:13px;font-weight:500;
  padding:6px 9px;border-radius:7px;white-space:nowrap;
  transition:background .1s,color .1s;
}
header nav a:hover{background:var(--track);color:var(--ink1);text-decoration:none}
header nav a.on{background:var(--berry);color:#fff;font-weight:600}
@media(prefers-color-scheme:dark){header nav a.on{background:var(--blush)}}
.lang-toggle{
  margin-left:auto;font-size:12px;color:var(--ink3);
  white-space:nowrap;flex-shrink:0;padding:6px 0;
}
.lang-toggle a{color:var(--accent)}
@media(max-width:600px){
  header{padding:10px 14px}
  .brand{font-size:18px;margin-right:10px}
  header nav a{font-size:12px;padding:5px 7px}
}

/* ── Layout ───────────────────────────────────────────────────────────── */
main{max-width:1020px;margin:0 auto;padding:24px 22px 40px}
@media(max-width:600px){main{padding:16px 14px 32px}}

/* ── Typography ───────────────────────────────────────────────────────── */
h1{font-size:26px;font-weight:800;margin:0 0 4px;letter-spacing:-.3px}
h2{font-size:13px;font-weight:700;color:var(--ink2);margin:24px 0 10px}
.sub{color:var(--ink3);font-size:13px;margin:4px 0 0;line-height:1.5}
.sech{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--ink3);margin:0 0 10px
}
.secsub{font-weight:400;text-transform:none;letter-spacing:0;font-size:11px}
@media(max-width:600px){h1{font-size:22px}}

/* ── Cards ────────────────────────────────────────────────────────────── */
.card,.contentcard{
  background:var(--surface1);border:1px solid var(--grid);
  border-radius:12px;padding:18px 20px;margin-bottom:18px;
}
@media(max-width:600px){.card,.contentcard{padding:14px 14px}}
.contentcard{font-size:14px;line-height:1.7;color:var(--ink2)}
.contentcard p{margin:0 0 12px}
.contentcard p:last-child{margin-bottom:0}
.contentcard strong{color:var(--ink1)}
.contentcard a{color:var(--blush)}
.contentcard code{
  font-family:ui-monospace,"SF Mono",monospace;font-size:12px;
  background:var(--track);padding:2px 5px;border-radius:4px;color:var(--ink1);
}
.legend{font-size:12px;color:var(--ink3);margin:10px 0 0}

/* ── Tables ───────────────────────────────────────────────────────────── */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px}
table{border-collapse:collapse;width:100%;font-size:14px}
th{
  text-align:right;color:var(--ink3);
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--grid);padding:6px 8px;white-space:nowrap;
}
td{
  text-align:right;padding:7px 8px;
  border-bottom:1px solid var(--track);
  font-variant-numeric:tabular-nums;
}
th:first-child,td:first-child,th.name,td.name{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:color-mix(in srgb,var(--track) 50%,transparent)}
@media(max-width:600px){th,td{padding:5px 6px;font-size:13px}}

/* ── Controls / segments ──────────────────────────────────────────────── */
.controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.ctl-lab{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--ink3);flex-shrink:0;
}
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg a,.filters a{
  padding:4px 12px;border-radius:999px;
  border:1px solid var(--grid);color:var(--ink2);
  font-size:13px;font-weight:500;
  transition:background .1s,color .1s,border-color .1s;
  white-space:nowrap;
}
.seg a:hover,.filters a:hover{background:var(--track);color:var(--ink1);text-decoration:none}
.seg a.on,.seg a.active,.filters a.active{
  background:var(--berry);border-color:var(--berry);color:#fff;font-weight:600;
}
@media(prefers-color-scheme:dark){
  .seg a.on,.seg a.active,.filters a.active{background:var(--blush);border-color:var(--blush)}
}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
@media(max-width:600px){.seg a,.filters a{font-size:12px;padding:3px 10px}}

/* ── Stat tiles ───────────────────────────────────────────────────────── */
.tiles{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 20px}
.tile{
  background:var(--surface1);border:1px solid var(--grid);
  border-radius:12px;padding:13px 16px;min-width:100px;flex:1;
}
.tile .label,.tile .tl{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--ink3);margin-bottom:4px;
}
.tile .value,.tile .tvv{font-size:26px;font-weight:800;color:var(--ink1);line-height:1.1}
.tile.hero{background:color-mix(in srgb,var(--candy) 15%,var(--surface1))}
.tile.hero .value,.tile.hero .tvv{color:var(--berry)}
@media(prefers-color-scheme:dark){
  .tile.hero{background:color-mix(in srgb,var(--bordeaux) 60%,var(--surface1))}
  .tile.hero .value,.tile.hero .tvv{color:var(--candy)}
}
@media(max-width:480px){
  .tiles{gap:8px}
  .tile{min-width:80px;padding:10px 12px}
  .tile .value,.tile .tvv{font-size:22px}
}

/* ── Leaderboard ──────────────────────────────────────────────────────── */
.lbwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px}
.lb{min-width:560px}
.rk{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  background:var(--berry);color:#fff;font-size:11px;font-weight:700;
}
.pl{color:var(--ink1);font-weight:600}
.pl:hover{color:var(--berry)}
.tehocell{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.tv{font-weight:700;font-size:14px;min-width:30px;text-align:right}
.teho-bar{
  display:inline-block;height:7px;border-radius:3.5px;
  background:var(--blush);vertical-align:middle;min-width:3px;
}
@media(prefers-color-scheme:dark){.teho-bar{background:var(--candy)}}
@media(max-width:600px){.lb th,.lb td{font-size:12px;padding:6px 6px}}

/* ── Percentile bars ──────────────────────────────────────────────────── */
.pctrow{
  display:grid;grid-template-columns:148px 1fr 64px;
  gap:10px;align-items:center;padding:5px 0;
}
.pctrow .label,.pctrow .pl2{font-size:13px;color:var(--ink2);text-align:left}
.pctrow .value,.pctrow .pv{
  font-size:13px;color:var(--ink1);text-align:right;
  font-variant-numeric:tabular-nums;
}
.track{position:relative;height:10px;border-radius:5px;background:var(--track)}
.fill{position:absolute;inset:0 auto 0 0;border-radius:5px;height:100%}
.badge{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  min-width:25px;height:25px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  box-shadow:0 0 0 2px var(--surface1);
}
.b0 .fill{background:var(--p0)} .b1 .fill{background:var(--p1)}
.b2 .fill{background:var(--p2)} .b3 .fill{background:var(--p3)}
.b4 .fill{background:var(--p4)} .b5 .fill{background:var(--p5)}
.b6 .fill{background:var(--p6)}
.b0 .badge{background:var(--p0);color:var(--pt0)}
.b1 .badge{background:var(--p1);color:var(--pt1)}
.b2 .badge{background:var(--p2);color:var(--pt2)}
.b3 .badge{background:var(--p3);color:var(--pt3)}
.b4 .badge{background:var(--p4);color:var(--pt4)}
.b5 .badge{background:var(--p5);color:var(--pt5)}
.b6 .badge{background:var(--p6);color:var(--pt6)}
@media(max-width:600px){
  .pctrow{grid-template-columns:120px 1fr 52px;gap:6px}
  .pctrow .label,.pctrow .pl2{font-size:12px}
}
@media(max-width:380px){
  .pctrow{grid-template-columns:100px 1fr 44px}
}

/* ── D3 chart styles ──────────────────────────────────────────────────── */
.fg-line{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.fg-muted{stroke:var(--track);opacity:.6;stroke-width:1.5}
.fg-dot{stroke:var(--surface1);stroke-width:2}
.fg-label{font-size:11px;font-weight:600;fill:var(--ink1)}
.fg-cross{stroke:var(--grid);stroke-width:1}
.axis text{font-size:11px;fill:var(--ink3)}
.axis line,.axis path{stroke:var(--grid)}
.axis .domain{display:none}
.chart-tip{
  position:absolute;pointer-events:none;z-index:10;
  background:var(--surface1);color:var(--ink1);
  border:1px solid var(--grid);border-radius:8px;
  padding:8px 10px;font-size:12px;line-height:1.6;
  box-shadow:0 2px 8px rgba(0,0,0,.12);min-width:130px;
}
.chart-tip .d{color:var(--ink3);margin-bottom:2px}
.chart-tip b{float:right;margin-left:14px;font-variant-numeric:tabular-nums}
.chart-tip .k{display:inline-block;width:8px;height:8px;border-radius:4px;margin-right:6px}
.minis{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px}
@media(max-width:560px){.minis{grid-template-columns:1fr}}
.mini .label{font-size:12px;color:var(--ink3);margin-bottom:4px}

/* ── Player page ──────────────────────────────────────────────────────── */
.pname{font-size:28px;font-weight:800;margin:0 0 4px;letter-spacing:-.3px}
.pmeta{color:var(--ink3);font-size:13px;margin:4px 0 0}
.pmeta a{color:var(--blush)}
@media(max-width:600px){.pname{font-size:22px}}
.split{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;align-items:start}
@media(max-width:720px){.split{grid-template-columns:1fr}}
.career th{font-size:11px}
.career td{font-size:12px}

/* ── Generic ──────────────────────────────────────────────────────────── */
.section{margin-bottom:28px}
footer{
  color:var(--ink3);font-size:12px;text-align:center;
  padding:20px 0 32px;border-top:1px solid var(--grid);margin-top:32px;
}
</style>
</head>
<body>
<header>
  <a class="brand" href="/">Mallo<i>.</i></a>
  <nav>
    {% for s in nav_seasons %}
    <a href="/?sid={{ s.id }}"
       class="{{ 'on' if (request.path in ('/','/leaderboard')) and request.args.get('sid','') == s.id|string }}">{{ s.series }}</a>
    {% else %}
    <a href="/" class="{{ 'on' if request.path in ('/','/leaderboard') }}">Tilastot</a>
    {% endfor %}
    <a href="/projections" class="{{ 'on' if request.path=='/projections' }}">PARE-ennusteet</a>
    <a href="/league"      class="{{ 'on' if request.path=='/league' }}">Sarjataulukko</a>
    <a href="/search"      class="{{ 'on' if request.path=='/search' }}">Haku</a>
    <a href="/glossary"    class="{{ 'on' if request.path=='/glossary' }}">Kaava</a>
    <a href="/about"       class="{{ 'on' if request.path=='/about' }}">About</a>
  </nav>
  <span class="lang-toggle">
    {% if lang == "fi" %}FI · <a href="{{ lang_url('en') }}">EN</a>
    {% else %}<a href="{{ lang_url('fi') }}">FI</a> · EN{% endif %}
  </span>
</header>
<main>{% block content %}{% endblock %}</main>
{% block scripts %}{% endblock %}
<footer>Mallo · pesäpallodata · <a href="/glossary">kaavat</a> · <a href="/about">about</a></footer>
</body>
</html>
