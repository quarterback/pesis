# fly.toml app configuration file generated for pesis on 2026-07-02T04:53:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pesis'
primary_region = 'cdg'

[build]
  dockerfile = "Dockerfile"

[env]
  PESIS_DB_PATH = "/data/pesis.db"

# Persistent DB: create the volume ONCE in the Fly web dashboard
# (app → Volumes → "pesis_data", region cdg, 3 GB — history is ~1.1 GB).
# After that everything is push-to-deploy; the app backfills itself.

[mounts]
  source = "pesis_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # keep the site always-on: no auto-stop on idle (it read as "the site
  # inexplicably shut down"); one machine always running
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[vm]]
  memory = '3gb'
  cpu_kind = 'performance'
  cpus = 1
  memory_mb = 3072
  processes = ['app']
  size = 'performance-cpu-1x'
