# Deploy with plain `fly deploy` from the repo root — [build.dockerfile]
# pins the repo Dockerfile (gunicorn); do NOT let `fly launch` scaffold its
# own Python/flask-run config over this.
app = 'pesis'
primary_region = 'cdg'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
